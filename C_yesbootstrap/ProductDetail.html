<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>혜진's 장바구니</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<div class="container my-4">
  <div class="mb-3">
    <button class="btn btn-secondary btn-sm" onclick="showLoading()">
      Loading
    </button>
    <button class="btn btn-danger btn-sm" onclick="showError()">
      No Data
    </button>
    <button class="btn btn-success btn-sm" onclick="showSuccess()">
      Success
    </button>
  </div>
<!--  로딩 화면-->
<!--  글자가 중앙에 올 것이며 지금은 안보이게 해둠.-->
<!--  로딩은 기본값으로 보여야함.-->
  <div id="loadingView" class="text-center" >
    <h3>상품 정보를 로딩중입니다..</h3>
  </div>

<!--  데이터 없음-->
  <div id="errorView" class="text-center" style="display: none;">
    <h3>상품 정보를 찾을 수 없습니다.</h3>
  </div>

<!--  정상 화면-->
<!--  정상 화면은 글자가 배치되지 않고 바로 상품 정보를 띄움.
 자연스럽게 텍스트가 가운데에 배치될 이유가 없어서 지움.-->
  <div id="successView" style="display: none;">
    <div class="card">
      <div class="row">
<!--        좌측 이미지-->

        <div class="col-md-4">
          <img src="/images/americano01.png" class=" rounded"
               alt="아메리카노" style="width:100%;height:100%;">
        </div>
<!--        우측 이미지-->
          <div class="col-md-8">
            <div class="card-body">
              <table class="table table-striped">
                <thead>
<!--                상품의 목록이 행이 아니라 열에 있기 때문에 tr이 필요 없음-->
                </thead>

                <tbody>
                <tr>
                  <td class="text-center col-ms-2">가격</td>
                  <td class="col-ms-10">4,000원</td>
                </tr>
                <tr>
                  <td class="text-center">카테고리</td>
                  <td>빵</td>
                </tr>
                <tr>
                  <td class="text-center">재고</td>
                  <td>10개</td>
                </tr>
                <tr>
                  <td class="text-center">설명</td>
                  <td>프랑스에서 유래한 버터가 많이 들어간 달콤하고 부드러운 빵입니다.</td>
                </tr>
                <tr>
                  <td class="text-center">등록일자</td>
                  <td>2026-03-20</td>
                </tr>


                </tbody>
              </table>
              <!--                구매 수량-->
              <div class="row col-mb-3 align-items-center">
                <div class="col-3 text-center">
                  구매수량
                </div>
                <div class="col-5">
                  <input type="number" min="1" max="100" class="form-control ">

                </div>

              </div>

              <div class="row col-mb-3 mt-3 align-items-center">
                <div class="col-3 text-center">
                  <a class="btn btn-primary" onclick="pd_cancle();">이전 목록</a>
                </div>
                <div class="col-3 text-center">
                  <a class="btn btn-success" onclick="pd_back();">장바구니</a>
                </div>
                <div class="col-3 text-center">
                  <a class="btn btn-danger" onclick="pd_order();">주문하기</a>
                </div>
              </div>


            </div>
          </div>
        </div>

      </div>

  </div>
  </div>

  <script>
    function showLoading() {
      document.getElementById('loadingView').style.display = 'block';
      document.getElementById('errorView').style.display = 'none';
      document.getElementById('successView').style.display = 'none';
    }
    function showError() {
      document.getElementById('loadingView').style.display = 'none';
      document.getElementById('errorView').style.display = 'block';
      document.getElementById('successView').style.display = 'none';
    }
    function showSuccess() {
      document.getElementById('loadingView').style.display = 'none';
      document.getElementById('errorView').style.display = 'none';
      document.getElementById('successView').style.display = 'block';
    }
    function pd_cancle() {
      alert("이전 목록으로 넘어갑니다.");
    }
    function pd_back() {

      alert("장바구니 목록을 보여줍니다.");
    }
    function pd_order() {
      const is_delect = confirm("상품을 주문하시겠습니까?");
      if(!is_delect) return;
      alert("주문 되었습니다.");
    }
  </script>


</body>
</html>
