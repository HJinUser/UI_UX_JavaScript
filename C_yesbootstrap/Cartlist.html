<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>혜진's 카페테리아</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .th_column{
            font-size:1.2rem;
        }
    </style>
</head>
<body>

<div class="container mt-3">
    <h2 class="mb-4">
        <span style="color:blue; font-size:2rem;">홍길동</span>
        <span style="font-size:1.3rem;">님의 장바구니</span>
    </h2>

    <table class="table table-hover">
        <thead>
        <tr >
            <th class="th_column">
                전체 선택
            </th>
            <th class=" th_column">
                상품 정보
            </th>
            <th class=" th_column">
                수량
            </th>
            <th class=" th_column">
                금액
            </th>
            <th class=" th_column">
                삭제
            </th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td class="text-center align-middle">
                <input type="checkbox" checked>
            </td>
            <td class="text-center align-middle">
                <div class = "row">
                    <div class="col-4">
                        <img src="/images/americano01.png" class="img-thumbnail" alt = "아메리카노">
                    </div>
                    <div class="col-8">
                        아메리카노
                    </div>
                </div>

            </td>
            <td class="text-center align-middle">
                <input type="number" class="form-control"
                style="width: 80px; margin:0 auto;" >
            </td>
            <td class="text-center align-middle">
                4,500원
            </td>
            <td class="text-center align-middle">
                <button type="button" class="btn btn-danger">
                    삭제
                </button>
            </td>
        </tr>
        <!--            ------------------------------------------------------------------------------------------>
        <!--            여기부터는 두번째 행입니다.-->

        </tbody>
    </table>
</div>
    <h3 class="text-end mt-3">
        총 주문 금액 : 10,500원
    </h3>
    <div class="text-end">
        <button type="button" class="btn btn-primary btn-lg">
            주문하기
        </button>
    </div>

</body>
</html>
