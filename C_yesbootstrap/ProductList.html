<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>상품 등록 페이지</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<div class="container my-4">
    <h4 class="my-4">상품 목록 페이지</h4>

    <!-- 관리자 버튼 -->
    <div class="mb-3">
        <a href="javascript:register();" >
<!--            클릭 되었을 때 register() 함수가 실행되어야함. 그래서 register() 만들기-->
            <button id="insertBtn"  class="btn btn-primary">상품 등록</button>
        </a>
    </div>


    <!-- 상품 목록 -->
    <div class="row" id="productContainer"></div>
<!--        JS로 카드 생성-->
</div>

<script>
    /*사용자 정보*/
    const user = {
        role: 'ADMIN' // USER, ADMIN
    };

    /*상품 목록*/
    const products = [
        {id:1 , name:'아메리카노', price:4000, image:'/images/americano01.png'},
        {id:2 , name:'브리오슈', price:6000, image:'/images/brioche_02.png'},
        {id:3 , name:'카푸치노', price:6500, image:'/images/cappuccino02.png'},
        {id:4 , name:'치아바타', price:7000, image:'/images/ciabatta_02.png'},
        {id:5 , name:'크로아상', price:3000, image:'/images/croissant_02.png'},
        {id:6 , name:'프렌치바게트', price:5500, image:'/images/french_baguette_01.png'}
    ];

    if (user.role !== 'ADMIN') {
        //화면에서 안보이고, 실제 공간도 없어짐.
        document.getElementById("insertBtn").style.display = 'none';
    }

    const container = document.getElementById("productContainer");

    // 상품 배열을 반복하여 목록 생성하기
    products.forEach(item => {
        // createElement : 자바 스크립트로 태그를 동적으로 생성
        const col = document.createElement("div");
        col.className="col-md-4 mb-4"

        col.innerHTML = `
            <div class="card h-100" style="cursor:pointer;" onclick="goDetail(${item.id})">
                <img src="${item.image}" class="card-img-top" style="height:200px;">
                <div class="card-body">
                    <table style="width:100%; border-collapse:collapse;">
                        <tr>
                            <td style="width:70%;">
                                <h5>${item.name}</h5>
                            </td>
<!--                            rowspan..? 여러행을 하나로 합칠 때 사용하는 속성  한번에 두줄 차지 -->
                            <td rowspan="2" style="text-align:center;" id="admin-${item.id}">
                            </td>
                        </tr>
                        <tr>
                            <td>
                                가격 : ${item.price.toLocaleString()}원
                            </td>
                        </tr>
                    </table>
                </div>
            </div>
        `
        container.appendChild(col);
        // console.log(item.name);


        //관리자일때 수정, 삭제 버튼도 추가.
        if (user.role === 'ADMIN') {
            const adminDiv = document.getElementById(`admin-${item.id}`);
            adminDiv.innerHTML = `
                <button class="btn btn-warning btn-sm mb-1" onclick="event.stopPropagation(); edit(${item.id})">
                수정</button>
                <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); remove(${item.id}, '${item.name}')">
                삭제</button>
            `;
        }

    });
    function register(){
        //실제로 상품을 등록 할 순 없으니까 메세지만 띄우기
        alert("상품 등록 완료");
    }

    // 🔹 상세 페이지 이동
    function goDetail(id) {
        // 아직 파일은 없지만 ProductDetailNew.html으로 이동된다. id 정보를 가지고
        location.href = `ProductDetailNew.html?id=${id}`;
    }

    // 🔹 수정
    function edit(id) {
        alert("수정 페이지 이동: " + id);
    }

    // 🔹 삭제
    function remove(id, name) {
        const isDelete = confirm(`'${name}' 상품을 삭제하시겠습니까?`);
        if (!isDelete) return;

        alert(`'${name}' 삭제 완료 (예시)`);

        // 화면에서 제거
        location.reload(); // 간단 처리
    }


</script>
</body>
</html>
