<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>혜진's 가게 오픈</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-3">
  <h2>상품 등록</h2>
  <form id="productForm">
<!--이름 입력 -->
    <div class="row mb-3 mt-3">
<!--   for="name" 으로 쓰면 id 속성의 name을 찾아준다.-->
      <label class="col-sm-2 col-form-label" for="name">이름:</label>
      <div class="col-sm-10">
      <input type="text" class="form-control" id="name" placeholder="이름 입력" name="name">
      <div class="invalid-feedback">이름 오류</div>
    </div>
    </div>

<!--    --------------------------------------------------------------------------->
    <!--가격 입력 -->
    <div class="row mb-3 mt-3">
      <!--   for="price" 으로 쓰면 id 속성의 price을 찾아준다.-->
      <label class="col-sm-2 col-form-label" for="price">가격:</label>
      <div class="col-sm-10">
        <input type="text" class="form-control" id="price" placeholder="가격 입력" name="price">
        <div class="invalid-feedback">가격 오류</div>
      </div>
    </div>
<!--    --------------------------------------------------------------------------->
    <!--상품 설명 입력 -->
    <div class="row mb-3 mt-3">
      <label class="col-sm-2 col-form-label" for="category">카테고리:</label>
      <div class="col-sm-10">
        <select id="category" name="category" class="form-select">
          <option value="-">-- 카테고리를 선택해 주세요.</option>
          <option value="bread">빵</option>
          <option value="beverage">음료수</option>
          <option value="cake">케이크</option>
        </select>
        <div class="invalid-feedback">카테고리 오류</div>
      </div>
    </div>
<!--    --------------------------------------------------------------------------->
    <!--재고 입력 -->
    <div class="row mb-3 mt-3">
      <!--   for="stock" 으로 쓰면 id 속성의 stock을 찾아준다.-->
      <label class="col-sm-2 col-form-label" for="stock">재고:</label>
      <div class="col-sm-10">
        <input type="text" class="form-control" id="stock" placeholder="재고 입력" name="stock">
        <div class="invalid-feedback">재고 오류</div>
      </div>
    </div>
<!--    --------------------------------------------------------------------------->
<!--이미지 선택  ---------------->
    <div class="row mb-3 mt-3">
      <!--   for="stock" 으로 쓰면 id 속성의 stock을 찾아준다.-->
      <label class="col-sm-2 col-form-label" for="image">이미지:</label>
      <div class="col-sm-10">
        <input type="file" class="form-control" name="image" id="image" placeholder="이미지 입력">
        <div class="invalid-feedback">이미지 오류</div>
      </div>
    </div>
<!--    --------------------------------------------------------------------------->
    <!--상품 설명 입력 -->
    <div class="row mb-3 mt-3">
      <!--   for="description" 으로 쓰면 id 속성의 description을 찾아준다.-->
      <label class="col-sm-2 col-form-label" for="description">상품 설명:</label>
      <div class="col-sm-10">
        <input type="text" class="form-control" id="description" placeholder="상품 설명 입력" name="description">
        <div class="invalid-feedback">상품 설명 오류</div>
      </div>
    </div>
    <div class="text-center">

    <button type="submit" class="btn btn-primary btn-lg">Submit</button>

    </div>

  </form>
</div>
</body>
</html>
