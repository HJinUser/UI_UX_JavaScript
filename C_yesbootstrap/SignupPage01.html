<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>회원 가입하기 1회차</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            font-family: 'Avenir', Helvetica, Arial, sans-serif;
        }
        div#box{
            width: 50%;
            height: 50%;
            margin:20% auto;
            text-align: center;
            position: relative;
            border: 1px solid lightgray;
            border-radius: 8px;
            padding: 5px;
        }
    </style>
</head>
<body>
<div id="box">
<div class="container mt-3 ">

    <h3>회원 가입</h3>
    <form id="productForm">
        <div class="row mb-3 mt-3">
            <label class="col-sm-3 form-label text-start" for="name">이름 : </label>
            <div class="col-sm-9 ">
                <input type="text" class="form-control" id="name"  placeholder="이름을 입력해주세요." name="name">
                <div class="invalid-feedback">이름 오류 </div>
            </div >
        </div>

        <div class="row mb-3 mt-3">
            <label class="form-label col-sm-3 text-start" for="email">이메일 :</label>
            <div class="col-sm-9">
                <input type="text" class="form-control" id="email" placeholder="이메일을 입력해주세요." name="email">
                <div class="invalid-feedback">이메일 오류</div>
            </div>
        </div>

        <div class="row mb-3 mt-3">
            <label class="form-label col-sm-3 text-start" for="password">비밀번호 : </label>
            <div class="col-sm-9">
                <input type="text" class="form-control" id="password" placeholder="비밀 번호를 입력해 주세요.">
            </div>
        </div>

        <div class="row mb-3 mt-3">
            <label class="form-label col-sm-3 text-start" for="address">주소 : </label>
            <div class="col-sm-9">
                <input type="text" class="form-control" id="address" placeholder="주소를 입력해 주세요.">
            </div>
        </div>

        <button type="submit" class="btn btn-primary" >회원가입</button>
    </form>
</div>
</div>
</body>
</html>
