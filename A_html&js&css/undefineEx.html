<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>혜진's Undefine Exam</title>
</head>
<body>
    <div id="output"></div>
    <script>
//      document는 이 문서 전체를 의미하고 있다.
//      지금 위에서 만든 id인 "output"은 유일무이하고 이것을 가져올 수 있음.
        let output = document.getElementById("output");
//      output에 들어있는것은 id로 객체가 들어있다.

        let mytitle = '자바스크립트';
//      자바 스크립트가 output객체에(div) 문자열을 출력함. (innerHTML)
        output.innerHTML += '타이틀 : '+mytitle+'<br>'; //br을 사용해서 엔터
//      문자열 결합을 사용하기 위해 +랑 '로 묶고 html을 쓰면 된다.

//      자바스크립트에서는 변수 정의만 되어있으면 undefined로 나온다.
        let myname;
        output.innerHTML += '이름 : '+myname+'<br>';

        mynamne="김철수";
        output.innerHTML +='이름(값 할당) : '+ myname+'<br>';

//      ==는 결과(값)만 비교한다. 여기서는 no가 나옴. 만약 ===라면?
        if(myname == undefined){
            output.innerHTML +='결과 : no<br>';
        }
        else{
            output.innerHTML +='결과 : yes<br>';
        }

//      타입과 값까지 전부 다 비교하는건 ===로 한다.
        if(myname === undefined){
            output.innerHTML +='결과 : no<br>';
        }
        else{
            output.innerHTML +='결과 : yes<br>';
        }
        //다른 결과도 봐야겠죠?

        let num =1;
        let str ="1";

//      ==는 값만 비교, ===는 값과 타입을 모두 비교
        output.innerHTML += '==비교 : '+(num == str) + '<br>';
        output.innerHTML += '===비교 : '+(num === str) + '<br>';

        myname="김철수";
        output.innerHTML +='이름(값 할당) : '+myname+'<br>';

        //pi는 바뀌면 안되는 존재. 상수로 표현해야한다 -> const
        // let pi = 3.14;
        // pi = 5.14;   => O

        const pi = 3.14; //편집 불가능
        // pi = 5.14;   => X

        output.innerHTML += 'pi : '+pi+'<br>';

        /*중괄호는 무주건 객체입니다.*/
//      키 : 값
        const hong={name : '홍길동', age:15};

        //호출시에는 객체이름.키이름 방식으로 한다.
        output.innerHTML += '객체의 이름 : '+hong.name+'<br>';
        output.innerHTML += '객체의 나이 : '+hong.age+'<br>';
        /* 대괄호는 무조건 배열입니다. 이거 파이썬 아닌가*/

        const members = ['김철수','이규철','박진섭'];
        output.innerHTML += '0번째 요소 : '+members[0]+'<br>';
        output.innerHTML += '3번째 요소 : '+members[3]+'<br>'; //못찾아서 undefined로 뜸. 자바였으면 error
    </script>
</body>
</html>
