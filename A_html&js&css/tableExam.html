<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>주요허브소개</title>
    <style>
        body{
            background-image: url("/images/bg_choco.jpg");
            background-repeat: repeat-x;
            background-attachment: fixed;
        }

        table{
            width: 500px;
            border-top: 1px solid darkgreen;
            border-left: 1px solid darkgreen;
            border-right: 1px solid darkgreen;
            border-bottom: 1px solid darkgreen;
        }

        thead{
            background: darkgreen;
            color: white;
            font-size:12px;
        }

        tbody{
            color: green;
            font-size:12px;
        }

        th{
            border-right: 1px solid white;
            padding: 10px;
        }

        td{
            border-right: 1px solid darkgreen;
            border-bottom: 1px solid darkgreen;
            padding: 10px;
        }

    </style>
</head>
<body>
    <table>
        <caption>주요 허브 소개</caption>
        <!-- thead의 속성 부분 -->
        <!-- thead의 값 부분-->
        <thead>
            <tr>
                <th>이름</th>
                <th>사진</th>
                <th>설명</th>
            </tr>
        <!-- 한줄-->
        </thead>
            <tbody>
                <tr>
                    <td><a href="https://naver.com">바질</a></td>
                    <td><img src="/images/basil.jpg" alt="바질"> </td>
                    <td>두통, 신경과민 등에 좋다.</td>
                </tr>
                <tr>
                    <td><a href="https://daum.net">캐모마일</a></td>
                    <td><img src="/images/chamomile.jpg" alt="캐모마일"> </td>
                    <td>목욕제로 쓰면 심신의 긴장을 완화한다.</td>
                </tr>
                <tr>
                    <td><a href="https://google.com">레몬밤</a> </td>
                    <td><img src="/images/lemonbalm.jpg" alt="레몬밤"> </td>
                    <td>레몬밤의 차는 뇌의 활동을 강화한다.</td>
                </tr>
            </tbody>
    </table>
</body>
</html>
