<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>혜진's 과일 가게</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        .container{
            margin:20px;
        }
        table{
            width:100%;
            border: 1px solid #ddd;
            border-collapse: collapse;
        }
        thead{
            background: rgba(236, 236, 236, 0.67);
        }
        th, td{
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        /*가상(pseudo) 클래스 */
        /*tr 태그에 마우스가 영역 안으로 들어가면 적용*/
        tr:hover{
            background-color: #f5f5f5;
        }
        th {
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <table>
        <thead>
            <tr>
                <th>아이디</th>
                <th>상품명</th>
                <th>단가</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>사과</td>
                <td>3,000원</td>
            </tr>
            <tr>
                <td>2</td>
                <td>바나나</td>
                <td>2,500원</td>
            </tr>
            <tr>
                <td>3</td>
                <td>딸기</td>
                <td>5,000원</td>
            </tr>

        </tbody>
    </table>
</div>
</body>
</html>
